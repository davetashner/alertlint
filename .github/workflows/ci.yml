name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal doc links (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir ${{ github.workspace }} '*.md' 'docs/**/*.md'
          fail: true

  traceability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify spec/ADR structure and REQ-ID traceability
        run: python3 scripts/check_traceability.py
      - name: Validate archetype library against schema
        run: |
          python3 -m pip install --quiet jsonschema pyyaml
          python3 scripts/check_archetypes.py

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Go module
        id: detect
        run: echo "present=$([ -f go.mod ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - name: No Go module yet
        if: steps.detect.outputs.present == 'false'
        run: echo "go.mod not present — Go checks are no-ops until implementation begins."
      - uses: actions/setup-go@v5
        if: steps.detect.outputs.present == 'true'
        with:
          go-version-file: go.mod
      - name: gofmt
        if: steps.detect.outputs.present == 'true'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt required for:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: go vet
        if: steps.detect.outputs.present == 'true'
        run: go vet ./...
      - name: golangci-lint
        if: steps.detect.outputs.present == 'true'
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: go build
        if: steps.detect.outputs.present == 'true'
        run: go build ./...
      - name: go test
        if: steps.detect.outputs.present == 'true'
        run: go test -race -count=1 ./...
      - name: contract acceptance (replay + jq)
        if: steps.detect.outputs.present == 'true'
        run: |
          go run ./cmd/alertlint analyze --replay fixtures/demo --tenant demo \
            --out /tmp/contract-corpus --run-timestamp 2026-07-04T18:00:00Z \
            --identity-conventions fixtures/demo/identity-conventions.yaml
          scripts/check_contract.sh /tmp/contract-corpus
          go run ./cmd/alertlint validate /tmp/contract-corpus
